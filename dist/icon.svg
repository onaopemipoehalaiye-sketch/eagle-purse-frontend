<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0B6623" rx="80"/>

  <!-- Eagle Shield Icon -->
  <g transform="translate(256, 256)">
    <!-- Shield outline -->
    <path d="M0,-180 L-120,-100 L-120,20 C-120,120 -60,180 0,200 C60,180 120,120 120,20 L120,-100 Z"
          fill="#FFD700"
          stroke="#FFC107"
          stroke-width="4"/>

    <!-- Eagle star shape -->
    <path d="M0,-80 L-15,-40 L-55,-40 L-25,-15 L-35,25 L0,0 L35,25 L25,-15 L55,-40 L15,-40 Z"
          fill="#0B6623"
          opacity="0.9"/>

    <!-- Coin accent -->
    <circle cx="0" cy="50" r="30" fill="#FFC107" opacity="0.7"/>
    <circle cx="0" cy="50" r="25" fill="#FFD700" opacity="0.9"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B6623" text-anchor="middle">₦</text>
  </g>
</svg>
